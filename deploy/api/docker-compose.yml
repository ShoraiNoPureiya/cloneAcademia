services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../BackEnd/ApiAcademia
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: 8080
      DATABASE_URL: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiresMinutes: ${JWT_EXPIRES_MINUTES}
      Cors__AllowedOrigins__0: ${FRONTEND_URL}
      Cors__AllowedVercelHostSuffix: .vercel.app
      MercadoPago__AccessToken: ${MERCADO_PAGO_ACCESS_TOKEN}
      MercadoPago__CurrencyId: BRL
      MercadoPago__UseSandbox: ${MERCADO_PAGO_USE_SANDBOX}
      MercadoPago__NotificationUrl: ${MERCADO_PAGO_NOTIFICATION_URL}
      Auth__RequireEmailConfirmation: ${AUTH_REQUIRE_EMAIL_CONFIRMATION}
      Auth__RequireTwoFactor: ${AUTH_REQUIRE_TWO_FACTOR}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__User: ${SMTP_USER}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__From: ${SMTP_FROM}
      Smtp__DisplayName: ${SMTP_DISPLAY_NAME}
      Smtp__EnableSsl: ${SMTP_ENABLE_SSL}
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
