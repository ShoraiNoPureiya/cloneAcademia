services:
  - type: web
    name: academia-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__Issuer
        value: ApiAcademia
      - key: Jwt__Audience
        value: ApiAcademia.Client
      - key: Jwt__ExpiresMinutes
        value: "60"
      - key: Auth__RequireEmailConfirmation
        value: "false"
      - key: Auth__RequireTwoFactor
        value: "false"
      - key: MercadoPago__CurrencyId
        value: BRL
      - key: MercadoPago__UseSandbox
        value: "false"
      - key: SeedAdmin__Email
        value: admin@pulsefit.com
